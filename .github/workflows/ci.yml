name: CI / Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-mvp-stack:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # To speed up the CI, we cache the heavy Python Prophet+CmdStan Docker layers
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Run Setup and Integration Test
      run: |
        chmod +x ./clean_setup.sh
        ./clean_setup.sh

    - name: Print Logs on Failure
      if: failure()
      run: |
        echo "=== GO API LOGS ==="
        docker-compose logs go-api || true
        echo "=== AI SERVICE LOGS ==="
        docker-compose logs ai-service || true
        echo "=== PROMETHEUS LOGS ==="
        docker-compose logs prometheus || true

    - name: Teardown
      if: always()
      run: |
        docker-compose down -v
