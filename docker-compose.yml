services:
  node-exporter:
    image: prom/node-exporter:latest
    ports: ["9100:9100"]

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]

  ai-service:
    build: ./ai-service
    ports: ["5000:5000"]
    # Prophet + CmdStan takes a long time to build first time in Docker

  go-api:
    build: ./go-api
    ports: ["8080:8080"]
    environment:
      PROMETHEUS_URL: "http://prometheus:9090"
      AI_SERVICE_URL: "http://ai-service:5000"
    depends_on:
      - prometheus
      - ai-service
